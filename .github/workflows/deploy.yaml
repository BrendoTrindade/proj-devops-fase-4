name: Pipeline CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest
    steps:
         - name: checkout
           uses: actions/checkout@v5.0.0

         - name: "Configure AWS Credentials" 
           uses: aws-actions/configure-aws-credentials@v6.0.0  
           with:
            role-to-assume: arn:aws:iam::447356678672:role/github-actions-BrendoTrindade-pipeline
            aws-region: us-east-1
         - name: Amazon ECR "Login" Action for GitHub Actions
           uses: aws-actions/amazon-ecr-login@v2.0.1

         - name: Build, Tag e push
           run: |
             docker build -t meu-website:v1.o . 
             docker tag meu-website:v1.o 447356678672.dkr.ecr.us-east-1.amazonaws.com/ecr_lab_fases:v1.0
             docker push 447356678672.dkr.ecr.us-east-1.amazonaws.com/ecr_lab_fases:v1.0
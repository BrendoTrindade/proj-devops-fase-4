name: Pipeline CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v5.0.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::447356678672:role/github-actions-BrendoTrindade-pipeline
          aws-region: us-east-1

      - name: Login no ECR
        uses: aws-actions/amazon-ecr-login@v2.0.1

      - name: Build, Tag e Push
        run: |
          docker build -t meu-website:v1.0 .
          docker tag meu-website:v1.0 447356678672.dkr.ecr.us-east-1.amazonaws.com/ecr_lab_fases:v1.0
          docker push 447356678672.dkr.ecr.us-east-1.amazonaws.com/ecr_lab_fases:v1.0

  job2:
    name: deploy_ec2
    needs: job1
    runs-on: ubuntu-latest

    env:
      CHAVE_PUBLICA_INSTANCE: ${{ secrets.CHAVE_PUBLICA_INSTANCE }}
      PUBLIC_IP: ${{ secrets.PUBLIC_IP }}

    steps:
      - name: Criar chave SSH
        run: |
          echo "$CHAVE_PUBLICA_INSTANCE" > proj-3fases.pem
          chmod 400 proj-3fases.pem

      - name: Esperar EC2 subir
        run: sleep 30

      - name: Deploy via SSH
        run: |
          ssh -i proj-3fases.pem -o StrictHostKeyChecking=no ec2-user@$PUBLIC_IP << 'EOF'
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 447356678672.dkr.ecr.us-east-1.amazonaws.com
          docker pull 447356678672.dkr.ecr.us-east-1.amazonaws.com/ecr_lab_fases:v1.0
          docker rm -f app-fases || true
          docker run -d -p 80:80 --name app-fases 447356678672.dkr.ecr.us-east-1.amazonaws.com/ecr_lab_fases:v1.0
          docker ps
          EOF

      - name: Remover chave
        run: rm -f proj-3fases.pem